<div class="d-flex justify-content-end mb-5">

    <div class="visit-card text-center shadow-sm">
        <div class="icon mb-1">👁️</div>

        <div class="title">عدد الزيارات</div>

        <div class="count">
            {{ visitorCount }}
        </div>
    </div>

</div>

<div class="row mb-3">
    <div class="col-12 col-md-6 mx-auto">

        <input type="text" class="form-control shadow-sm rounded-pill px-4" placeholder="🔍 ابحث عن موظف..."
            [(ngModel)]="searchText" />

    </div>
</div>
<div class="row g-3 mt-2">
    <div class="col-12 col-md-4" *ngFor="let emp of employees | filterByName: searchText">
        <div class="card shadow-lg py-2">
            <div class="card-body d-flex align-items-center" [routerLink]="['/employee-report', emp.id]"
                style="cursor: pointer;">

                <span class="flex-grow-1 text-start fw-semibold fs-5">
                    <span class="me-2">👤</span> {{ emp.name }}
                </span>

                <span class="flex-grow-1 text-center">
                    {{ emp.sap }}
                </span>

                <span class="flex-grow-1 text-end">
                    <span class="badge bg-secondary">{{ emp.job }}</span>
                </span>

            </div>
        </div>
    </div>
</div>
